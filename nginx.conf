server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # HA healthcheck endpoint (used by ActionsHA-test monitor + NPM)
    location = /healthcheck {
        default_type text/plain;
        add_header Cache-Control "no-store";
        return 200 'ok';
    }

    # Long-cache immutable Next.js build assets
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Generated OG cards
    location /og/ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Static export: serve clean/trailing-slash URLs, fall back to index.html
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    error_page 404 /404.html;
}
